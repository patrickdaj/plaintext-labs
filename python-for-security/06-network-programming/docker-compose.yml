services:
  target:
    image: python:3.12.9-slim
    command: >
      python3 -c "
      import socket, threading, time
      banners = {22: b'SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.6\r\n',
                 80: b'HTTP/1.1 200 OK\r\nServer: nginx/1.25.3\r\nContent-Length: 0\r\n\r\n',
                 443: b'',
                 8080: b'HTTP/1.1 200 OK\r\nServer: Apache/2.4.58\r\n\r\n'}
      def handle(conn, banner):
          try:
              if banner: conn.sendall(banner)
              conn.recv(1024)
          except: pass
          finally: conn.close()
      def serve(port, banner):
          s = socket.socket()
          s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
          s.bind(('0.0.0.0', port))
          s.listen(10)
          while True:
              conn, _ = s.accept()
              threading.Thread(target=handle, args=(conn, banner), daemon=True).start()
      for port, banner in banners.items():
          threading.Thread(target=serve, args=(port, banner), daemon=True).start()
      print('Echo server listening on 22,80,443,8080', flush=True)
      while True: time.sleep(1)
      "
    networks:
      - lab-net

  lab:
    build: .
    image: plaintext/python-network:1.0
    working_dir: /lab
    volumes:
      - ./:/lab
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: "host"
    command: sleep infinity
