services:
  threat-api:
    build: ./mock-api
    image: plaintext/mock-threat-api:1.0
    ports:
      - "8080:8080"

  lab:
    build: .
    image: plaintext/python-enrichment:1.0
    working_dir: /lab
    volumes:
      - ./:/lab
    environment:
      - VT_API_KEY=demo-key
      - THREAT_API_URL=http://threat-api:8080
    depends_on:
      - threat-api
    command: sleep infinity
