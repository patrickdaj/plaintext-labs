services:
  threat-api:
    build: ./mock-api
    image: plaintext/mock-threat-api:1.0

  lab:
    build: .
    image: plaintext/python-cli-tools:1.0
    working_dir: /lab
    volumes:
      - ./:/lab
    environment:
      - THREAT_API_URL=http://threat-api:8080
    depends_on:
      - threat-api
    command: sleep infinity
