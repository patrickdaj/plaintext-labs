version: "3.9"

services:
  server:
    image: wlambert/velociraptor:0.72.4
    container_name: velo-server
    command: >
      sh -c "
        velociraptor config generate --merge '{\"Client\":{\"server_urls\":[\"http://server:8000/\"]},\"GUI\":{\"bind_address\":\"0.0.0.0\",\"bind_port\":8889},\"Frontend\":{\"bind_address\":\"0.0.0.0\",\"bind_port\":8000}}' > /config/server.config.yaml &&
        velociraptor --config /config/server.config.yaml frontend --plaintext
      "
    volumes:
      - velo-config:/config
      - velo-data:/velociraptor
    ports:
      - "8889:8889"
      - "8000:8000"
    networks:
      - velo-net
    healthcheck:
      test: ["CMD", "sh", "-c", "test -f /config/server.config.yaml"]
      interval: 5s
      timeout: 5s
      retries: 10

  agent:
    image: wlambert/velociraptor:0.72.4
    container_name: velo-agent
    depends_on:
      server:
        condition: service_healthy
    command: >
      sh -c "
        sleep 5 &&
        velociraptor config client --config /config/server.config.yaml > /config/client.config.yaml &&
        velociraptor --config /config/client.config.yaml client -v
      "
    volumes:
      - velo-config:/config
    networks:
      - velo-net

  lab:
    image: wlambert/velociraptor:0.72.4
    container_name: velo-lab
    depends_on:
      - server
      - agent
    volumes:
      - velo-config:/config
      - ./data:/data
      - ./scripts:/scripts
    networks:
      - velo-net
    entrypoint: ["sh", "-c", "sleep infinity"]

volumes:
  velo-config:
  velo-data:

networks:
  velo-net:
    driver: bridge
