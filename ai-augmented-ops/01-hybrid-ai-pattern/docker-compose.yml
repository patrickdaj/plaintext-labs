# Module 01 — The Hybrid AI Pattern
# Starts a local Ollama instance and a minimal demo container.
# OLLAMA_MODEL defaults to tinyllama (~637 MB, CPU-friendly).
# Override: OLLAMA_MODEL=phi3:mini make demo
services:
  ollama:
    image: ollama/ollama:0.3.14
    container_name: ai01-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=5m

  lab:
    image: python:3.12-slim
    container_name: ai01-lab
    depends_on:
      - ollama
    volumes:
      - ./:/lab
    working_dir: /lab
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-tinyllama}
    command: sleep infinity

volumes:
  ollama-data:
