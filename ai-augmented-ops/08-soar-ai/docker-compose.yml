# Module 08 — SOAR + AI
# n8n (workflow engine) + Ollama (AI classification)
services:
  ollama:
    image: ollama/ollama:0.3.14
    container_name: ai08-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=15m

  n8n:
    image: n8nio/n8n:1.48.3
    container_name: ai08-n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
      - ./:/lab
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      - N8N_LOG_LEVEL=info
      - NODE_ENV=production
    depends_on:
      - ollama

  lab:
    image: python:3.12-slim
    container_name: ai08-lab
    depends_on:
      - n8n
      - ollama
    volumes:
      - ./:/lab
    working_dir: /lab
    command: sleep infinity

volumes:
  ollama-data:
  n8n-data:
