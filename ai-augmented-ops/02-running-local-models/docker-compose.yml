# Module 02 — Running Local Models
# Ollama + a benchmark runner container.
# OLLAMA_MODEL defaults to tinyllama (~637 MB, CPU-friendly).
# Override: OLLAMA_MODEL=phi3:mini make demo  (needs ~2 GB RAM)
services:
  ollama:
    image: ollama/ollama:0.3.14
    container_name: ai02-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=10m

  lab:
    image: python:3.12-slim
    container_name: ai02-lab
    depends_on:
      - ollama
    volumes:
      - ./:/lab
    working_dir: /lab
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-tinyllama}
    command: sleep infinity

volumes:
  ollama-data:
