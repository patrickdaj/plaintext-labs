# Module 09 — Securing the AI You Run
# Same stack as Module 06: Ollama + ChromaDB + copilot app.
services:
  ollama:
    image: ollama/ollama:0.3.14
    container_name: ai09-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=15m

  chromadb:
    image: chromadb/chroma:0.5.23
    container_name: ai09-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false

  copilot:
    image: python:3.12-slim
    container_name: ai09-copilot
    depends_on:
      - ollama
      - chromadb
    volumes:
      - ./:/lab
    working_dir: /lab
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - CHROMA_HOST=http://chromadb:8000
      - OLLAMA_MODEL=${OLLAMA_MODEL:-tinyllama}
      - DATA_DIR=/lab/data
    command: sleep infinity

volumes:
  ollama-data:
  chroma-data:
