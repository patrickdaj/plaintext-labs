# Module 10 — Attacking AI Systems
# garak and promptfoo in Docker alongside Ollama.
services:
  ollama:
    image: ollama/ollama:0.3.14
    container_name: ai10-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=15m

  garak:
    image: nvcr.io/nvidia/garak:0.9.0.17
    container_name: ai10-garak
    depends_on:
      - ollama
    volumes:
      - ./:/lab
    working_dir: /lab
    environment:
      - OLLAMA_HOST=http://ollama:11434
    command: sleep infinity

  promptfoo:
    image: ghcr.io/promptfoo/promptfoo:0.93.0
    container_name: ai10-promptfoo
    depends_on:
      - ollama
    volumes:
      - ./:/lab
    working_dir: /lab
    environment:
      - OLLAMA_HOST=http://ollama:11434
    command: sleep infinity

  lab:
    image: python:3.12-slim
    container_name: ai10-lab
    depends_on:
      - ollama
    volumes:
      - ./:/lab
    working_dir: /lab
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-tinyllama}
    command: sleep infinity

volumes:
  ollama-data:
