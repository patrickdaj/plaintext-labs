server {
    listen 443 ssl;
    server_name nginx-weak;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # WEAK: TLS 1.0 and 1.1 enabled (deprecated)
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2;

    # WEAK: includes RC4, NULL, EXPORT, and other weak ciphers
    ssl_ciphers HIGH:MEDIUM:LOW:!aNULL:!MD5;

    # WEAK: server preference not enforced
    ssl_prefer_server_ciphers off;

    # No HSTS header

    location / {
        return 200 "Meridian Financial API (weak TLS config)\n";
        add_header Content-Type text/plain;
    }
}
