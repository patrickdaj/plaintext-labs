[global]
   workgroup = MERIDIAN
   server string = Meridian Workstation
   security = user
   map to guest = Bad User
   # SMB signing NOT required (intentional misconfiguration for the lab)
   server signing = disabled
   client signing = disabled
   smb encrypt = disabled
   log level = 0
   max log size = 50

[share]
   path = /srv/share
   browseable = yes
   read only = no
   guest ok = yes
   comment = Workstation share
