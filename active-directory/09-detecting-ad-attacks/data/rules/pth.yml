title: Pass-the-Hash — NTLM Network Logon from Unusual Source
id: e1d8a9f4-6c5b-7d0e-2f9a-1b8c7d6e5f4a
status: test
description: |
  Detects pass-the-hash — NTLM network logon (Logon Type 3) from a source that doesn't
  match the expected authentication pattern. The AuthenticationPackageName 'NTLM' with
  Logon Type 3 from a workstation source is the primary PTH signal.
  Requires: Audit Logon (Success) on target hosts.
author: Plaintext Security
date: 2024-01-01
references:
  - https://attack.mitre.org/techniques/T1550/002/
  - https://www.microsoft.com/en-us/security/blog/2012/03/13/the-anatomy-of-pass-the-hash-attacks/
tags:
  - attack.lateral_movement
  - attack.t1550.002
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4624
    LogonType: 3
    AuthenticationPackageName: 'NTLM'
  filter_machine_accounts:
    TargetUserName|endswith: '$'
  filter_local:
    IpAddress|contains:
      - '127.0.0.1'
      - '::1'
      - '-'    # Null IP (local process)
  filter_anonymous:
    TargetUserName: 'ANONYMOUS LOGON'
  condition: selection and not filter_machine_accounts and not filter_local and not filter_anonymous
falsepositives:
  - Legitimate NTLM authentication from non-domain-joined systems (file servers, printers)
  - Scheduled tasks authenticating via NTLM
  - Applications configured for NTLM rather than Kerberos
  - Backup software using NTLM
level: medium
audit_policy_required:
  category: 'Logon/Logoff'
  subcategory: 'Audit Logon'
  setting: 'Success'
  note: 'Default on most Windows systems. Tune with SubjectUserSid != S-1-0-0 to reduce noise.'
