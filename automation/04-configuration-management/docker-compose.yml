services:
  target:
    image: ubuntu:22.04
    command: >
      bash -c "apt-get update -q && apt-get install -y -q openssh-server python3 &&
               mkdir -p /run/sshd &&
               echo 'root:ansible' | chpasswd &&
               sed -i 's/#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config &&
               sed -i 's/#PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config &&
               /usr/sbin/sshd -D"
    hostname: target

  controller:
    build: .
    image: plaintext/ansible-controller:1.0
    working_dir: /ansible
    volumes:
      - ./:/ansible
    depends_on:
      - target
    command: sleep infinity
